<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Internal:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <style type="text/tailwindcss">
        @layer base {
            :root {
                /* Light Mode */
                --theme-bg: #ffffff;
                --theme-surface: #f9fafb; /* gray-50 */
                
                --theme-text: #1f2937; /* gray-800 */
                --theme-text-heading: #111827; /* gray-900 */
                --theme-text-muted: #6b7280; /* gray-500 */
                
                --theme-border: #e5e7eb; /* gray-200 */
                --theme-border-soft: #f3f4f6; /* gray-100 */
                
                --theme-primary: #9333ea; /* purple-600 */
                --theme-primary-hover: #a855f7; /* purple-500 */
                --theme-primary-text: #ffffff;
                
                --theme-cyan: #2563eb; /* blue-600 */
                --theme-cyan-bg: #dbeafe; /* blue-100 */
                
                --theme-green: #16a34a; /* green-600 */
                --theme-green-bg: #dcfce7; /* green-100 */
                
                --theme-shadow-default: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
                --theme-shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
                --theme-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

                --theme-btn-hover-cyan: #3b82f6; /* hover:border-blue-500 */
                --theme-btn-hover-green: #22c55e; /* hover:border-green-500 */
            }
            .dark {
                /* Dracula Dark Mode */
                --theme-bg: #282a36; /* background-dark */
                --theme-surface: #44475a; /* dracula-current-line */
                
                --theme-text: #f8f8f2; /* dracula-foreground */
                --theme-text-heading: #f8f8f2;
                --theme-text-muted: #6272a4; /* dracula-comment */
                
                --theme-border: #44475a;
                --theme-border-soft: rgba(68, 71, 90, 0.5); /* subtle border */
                
                --theme-primary: #bd93f9;
                --theme-primary-hover: #ff79c6; /* dracula-pink */
                --theme-primary-text: #282a36;
                
                --theme-cyan: #8be9fd;
                --theme-cyan-bg: rgba(139, 233, 253, 0.1); 
                
                --theme-green: #50fa7b;
                --theme-green-bg: rgba(80, 250, 123, 0.1);
                
                --theme-shadow-default: 0 1px 2px 0 rgba(189, 147, 249, 0.1);
                --theme-shadow-md: 0 4px 6px -1px rgba(189, 147, 249, 0.15);
                --theme-shadow-lg: 0 10px 15px -3px rgba(189, 147, 249, 0.2);

                --theme-btn-hover-cyan: #8be9fd;
                --theme-btn-hover-green: #50fa7b;
            }
            body {
                background-color: var(--theme-bg);
                color: var(--theme-text);
                font-family: 'Inter', sans-serif;
                transition: background-color 0.3s ease, color 0.3s ease;
            }
        }
        .theme-shadow-sm { box-shadow: var(--theme-shadow-default); }
        .theme-shadow-md { box-shadow: var(--theme-shadow-md); }
        .theme-shadow-lg { box-shadow: var(--theme-shadow-lg); }
    </style>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        theme: {
                            bg: "var(--theme-bg)",
                            surface: "var(--theme-surface)",

                            text: "var(--theme-text)",
                            heading: "var(--theme-text-heading)",
                            muted: "var(--theme-text-muted)",

                            border: "var(--theme-border)",
                            "border-soft": "var(--theme-border-soft)",

                            primary: "var(--theme-primary)",
                            "primary-hover": "var(--theme-primary-hover)",
                            "primary-text": "var(--theme-primary-text)",

                            cyan: "var(--theme-cyan)",
                            "cyan-bg": "var(--theme-cyan-bg)",

                            green: "var(--theme-green)",
                            "green-bg": "var(--theme-green-bg)",

                            "hover-cyan": "var(--theme-btn-hover-cyan)",
                            "hover-green": "var(--theme-btn-hover-green)"
                        }
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body class="font-display overflow-y-scroll min-h-screen bg-theme-bg transition-colors duration-300">

            <div class="flex items-center gap-4 z-10">

    <div class="flex p-4 @container">
        <div class="flex w-full flex-col gap-6 items-center">

                </div>
                <div class="flex flex-col items-center justify-center">
                    <p
                        class="text-theme-heading text-[24px] font-bold leading-tight tracking-[-0.015em] text-center transition-colors duration-300">
                        Alex Johnson</p>
                    <p
                        class="text-theme-cyan text-base font-normal leading-normal text-center mt-1 transition-colors duration-300">

            </div>
            <button

    <div class="flex flex-wrap gap-4 px-4 py-6 mt-4">
        <div
            class="flex min-w-[111px] flex-1 basis-[fit-content] flex-col gap-2 rounded-lg bg-theme-surface p-4 items-center text-center theme-shadow-md border border-theme-border-soft transition-colors duration-300">
            <p
                class="text-theme-heading tracking-light text-3xl font-bold leading-tight transition-colors duration-300">

            <div class="flex items-center gap-2">
                <p

                    Rides Shared</p>
            </div>
        </div>
        <div

            <div class="flex items-center gap-2">

                    Average Rating</p>
            </div>
        </div>
        <div
            class="flex min-w-[111px] flex-1 basis-[fit-content] flex-col gap-2 rounded-lg bg-theme-surface p-4 items-center text-center theme-shadow-md border border-theme-border-soft transition-colors duration-300">

                120</p>
            <div class="flex items-center gap-2">

    <div class="px-4 mt-6">
        <h2

            Verification Badges</h2>
    </div>

    <div class="grid grid-cols-[repeat(auto-fit,minmax(200px,1fr))] gap-4 p-4">
        <div
            class="flex flex-1 gap-4 rounded-lg bg-theme-surface p-5 items-center theme-shadow-sm border border-theme-border-soft hover:border-theme-hover-cyan transition-colors duration-300">
            <div
                class="text-theme-cyan bg-theme-cyan-bg p-2 rounded-full flex items-center justify-center transition-colors duration-300">
                <span class="material-symbols-outlined text-2xl">mail</span>
            </div>
            <h2 class="text-theme-heading text-sm font-medium leading-tight transition-colors duration-300">
                University Email Verified</h2>
        </div>
        <div
            class="flex flex-1 gap-4 rounded-lg bg-theme-surface p-5 items-center theme-shadow-sm border border-theme-border-soft hover:border-theme-hover-green transition-colors duration-300">
            <div
                class="text-theme-green bg-theme-green-bg p-2 rounded-full flex items-center justify-center transition-colors duration-300">
                <span class="material-symbols-outlined text-2xl">phone_iphone</span>
            </div>
            <h2 class="text-theme-heading text-sm font-medium leading-tight transition-colors duration-300">
                Phone Number Verified</h2>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const htmlElement = document.documentElement;

        // Load theme from localStorage or default OS preference
        if (localStorage.getItem('sharedAppTheme') === 'dark' || (!('sharedAppTheme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
            themeIcon.textContent = 'dark_mode';
        } else {
            htmlElement.classList.remove('dark');
            themeIcon.textContent = 'light_mode';
        }

        // Toggle button logic
        themeToggle.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');

            if (htmlElement.classList.contains('dark')) {
                localStorage.setItem('sharedAppTheme', 'dark');
                themeIcon.textContent = 'dark_mode';
            } else {
                localStorage.setItem('sharedAppTheme', 'light');
                themeIcon.textContent = 'light_mode';
            }
        });
    </script>

</body>

</html>
